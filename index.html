<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ARS Systém</title>
    
    <!-- Přesměrování se spustí jen pokud je mobil online -->
    <script>
        if (navigator.onLine) {
            document.write('<meta http-equiv="refresh" content="0.1; url=https://tally.so/r/0QoN10">');
        }
    </script>

    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    
    <style>
        body { background: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { text-align: center; }
        img { width: 120px; border-radius: 20%; }
        /* Styl pro varovnou hlášku */
        .offline-msg { display: none; color: #d9534f; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="favicon.png">
        <p id="status-text">Načítám...</p>
        <div id="offline-info" class="offline-msg">⚠️ Jsi offline. Zkontroluj data.</div>
    </div>

    <script>
        // Funkce zkontroluje, jestli má zámečník signál
        if (!navigator.onLine) {
            document.getElementById('status-text').style.display = 'none';
            document.getElementById('offline-info').style.display = 'block';
        }

        // TADY MĚNÍŠ ČAS: (100 pro provoz / 99999 pro instalaci)
        setTimeout(function() {
            if (navigator.onLine) {
                window.location.replace("https://tally.so/r/0QoN10");
            }
        }, 100); 
    </script>
</body>
</html>

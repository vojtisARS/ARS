<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ARS Systém</title>
    
    <script>
        // RYCHLÝ REDIRECT: Pokud net jede, začneme hned načítat Tally
        if (navigator.onLine) {
            document.write('<meta http-equiv="refresh" content="0.1; url=https://tally.so/r/0QoN10">');
        }
    </script>

    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    
    <style>
        body { background: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { text-align: center; }
        img { width: 120px; border-radius: 20%; }
        /* Styl pro offline hlášku */
        .offline-msg { color: #d9534f; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="favicon.png">
        
        <!-- VÝCHOZÍ STAV: Nejdřív ukazujeme offline, skript to změní, jen když net jede -->
        <div id="offline-info" class="offline-msg">⚠️ Jsi offline. Zkontroluj data.</div>
        <p id="status-text" style="display:none;">Načítám...</p>
    </div>

    <script>
        // Pokud internet JEDE:
        if (navigator.onLine) {
            document.getElementById('offline-info').style.display = 'none';
            document.getElementById('status-text').style.display = 'block';

            // TADY MĚNÍŠ ČAS: (100 pro provoz / 99999 pro instalaci)
            setTimeout(function() {
                window.location.replace("https://tally.so/r/0QoN10");
            }, 100); 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ARS Systém</title>
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    
    <style>
        body { background: white; color: black; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { text-align: center; }
        img { width: 120px; border-radius: 20%; margin-bottom: 20px; }
        .offline-msg { color: #d9534f; font-weight: bold; font-size: 1.1rem; padding: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="favicon.png">
        <div id="content">
            <p id="status-text">Načítám...</p>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('status-text');

        if (navigator.onLine) {
            // ONLINE - Letíme na Tally
            setTimeout(function() {
                window.location.replace("https://tally.so");
            }, 100); // TADY DÁVÁŠ 99999 PŘI INSTALACI
        } else {
            // OFFLINE - Tvoje vlastní hláška
            statusText.innerHTML = "⚠️ Nemáte připojení k internetu.<br><small style='color:#666'>Zkontrolujte signál nebo data.</small>";
            statusText.className = "offline-msg";
        }
    </script>
</body>
</html>
